# .pre-commit-config.yaml
repos:
  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v6.0.0
    hooks:
      - id: trailing-whitespace
      - id: end-of-file-fixer
      - id: check-yaml
      - id: check-merge-conflict
      - id: detect-private-key
      - id: check-added-large-files

  - repo: https://github.com/koalaman/shellcheck-precommit
    rev: v0.11.0
    hooks:
      - id: shellcheck
        entry: shellcheck -x --severity=warning
        language: system
        files: |
          (?x)^(
            yt-dlp\.sh|
            src/script-runner\.sh|
            src/python|
            src/scripts/.*\.sh
          )$
        types: [file]

  - repo: https://github.com/scop/pre-commit-shfmt
    rev: v3.13.1-1
    hooks:
      - id: shfmt
        name: shfmt
        args: ["-w", "-i", "4", "-ci", "-bn", "-ln", "bash"]
        language: system
        files: |
          (?x)^(
            yt-dlp\.sh|
            src/script-runner\.sh|
            src/python|
            src/scripts/.*\.sh
          )$
        types: [file]
